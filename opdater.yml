name: Opdater Vandkant Boliger

on:
  schedule:
    # Kører hver dag kl. 06:00 dansk tid (04:00 UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Tillader manuel kørsel fra GitHub UI (knappen "Run workflow")

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  byg-og-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode fra repository
        uses: actions/checkout@v4

      - name: Opsæt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installér afhængigheder
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kør vandkant_boliger.py
        run: python vandkant_boliger.py
        # Ingen cache i GitHub Actions – henter altid friske data

      - name: Kopier HTML til docs/ mappe (GitHub Pages)
        run: |
          mkdir -p docs
          cp vandkant_kort.html docs/index.html
          cp vandkant_boliger.csv docs/vandkant_boliger.csv

      - name: Commit og push opdateret side
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Automatisk opdatering $(date '+%Y-%m-%d %H:%M')"
          git push
