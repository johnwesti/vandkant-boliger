name: Opdater Vandkant Boliger

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      hent_boliger:
        description: 'Hent nye boligdata fra Boliga'
        type: boolean
        default: true
      hent_kyst:
        description: 'Hent kystlinje fra OpenStreetMap'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  byg-og-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.hent_boliger }}" != "true" ]; then
            ARGS="$ARGS --ingen-boliger"
          fi
          if [ "${{ github.event.inputs.hent_kyst }}" = "true" ]; then
            ARGS="$ARGS --refresh kyst"
          fi
          python vandkant_boliger.py $ARGS

      - name: Copy to docs
        run: |
          mkdir -p docs
          cp vandkant_kort.html docs/index.html
          cp vandkant_boliger.csv docs/vandkant_boliger.csv
          cp boliger.json docs/boliger.json
          cp filter.html docs/filter.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Gem kyst-backup i repo hvis den er ny/opdateret
          if [ -f kyst_backup.pkl ]; then
            git add kyst_backup.pkl
          fi
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase -X theirs origin main
          git push
